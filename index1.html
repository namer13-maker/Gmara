<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>בית המדרש הדיגיטלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;800;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{
    --ink:#2b1a0d; --parch:#f4e8cf; --parch2:#ecdcb8; --gold:#7a4a1f;
    --gold2:#9c5f28; --line:#d6c097; --card:#fffdf6;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Frank Ruhl Libre',Georgia,serif;background:
    radial-gradient(circle at 18% 8%, #f6ead0 0%, #ecdcb6 45%, #ddc998 100%);
    color:var(--ink);min-height:100vh;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#c6a874;border-radius:6px;}
  button{font-family:inherit;cursor:pointer;}
  button:active{transform:scale(.98);}
  button:disabled{opacity:.5;cursor:default;}
  select,input{font-family:inherit;}
  .spin{width:26px;height:26px;border:3px solid #d9c39a;border-top-color:var(--gold);
    border-radius:50%;animation:r 1s linear infinite;}
  @keyframes r{to{transform:rotate(360deg);}}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .fade{animation:fade .4s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef} = React;

/* ===== 10 התוויות ===== */
const LABELS={
  "מימרא":"#FFF3D6","שאלה":"#E2F1E4","תשובה":"#FCE9D4","קושיה":"#FBDCE4",
  "תירוץ":"#D9F0F2","סברה":"#E2E4F3","ראיה":"#EFE0F2","הוה אמינא":"#FBE2D8",
  "קא משמע לן":"#E2F1E4","מחלוקת":"#F6E6FA"
};
const LABEL_DESC={
  "מימרא":"הצהרה / דין / פסיקה","שאלה":"מאי, אמאי, היכי, תניא","תשובה":"תשובה ישירה",
  "קושיה":"קשיא, אבל, ותסברא","תירוץ":"תירוץ לקושיה","סברה":"נימוק לוגי",
  "ראיה":"הבאת מקור / ברייתא","הוה אמינא":"הנחה שנדחית","קא משמע לן":"מסקנה",
  "מחלוקת":"אמר X... אמר Y"
};
const LABEL_NAMES=Object.keys(LABELS);
const tokenize=t=>(t||"").trim().split(/\s+/).filter(Boolean);

/* ===== עזרי רשת ===== */
async function loadJSON(path){
  const r=await fetch(path);
  if(!r.ok) throw new Error(path+" "+r.status);
  return r.json();
}

/* ===== אפליקציה ===== */
function App(){
  const [view,setView]=useState("home");
  const [index,setIndex]=useState(null);
  const [analyzedIdx,setAnalyzedIdx]=useState(null);
  const [err,setErr]=useState("");

  useEffect(()=>{
    Promise.all([loadJSON("index.json"),loadJSON("sugyot.json")])
      .then(([i,a])=>{setIndex(i);setAnalyzedIdx(a);})
      .catch(e=>setErr("שגיאה בטעינת המאגר. ודא שהקבצים הועלו יחד עם index.html."));
  },[]);

  return (
    <div>
      <header style={S.header}>
        <div style={S.logo}>
          <span style={{fontSize:30}}>📜</span>
          <div>
            <div style={S.logoTitle}>בית המדרש הדיגיטלי</div>
            <div style={S.logoSub}>עיון בש"ס ותרגול ניתוח סוגיות</div>
          </div>
        </div>
        <nav style={S.nav}>
          <button style={navBtn(view==="home")} onClick={()=>setView("home")}>בית</button>
          <button style={navBtn(view==="browse")} onClick={()=>setView("browse")}>עיון בש"ס</button>
          <button style={navBtn(view==="practice")} onClick={()=>setView("practice")}>תרגול סוגיות</button>
          <button style={navBtn(view==="memory")} onClick={()=>setView("memory")}>משחק זיכרון</button>
          <button style={navBtn(view==="signals")} onClick={()=>setView("signals")}>זיהוי תמרורים</button>
        </nav>
      </header>
      <main style={S.main}>
        {err && <div style={S.errBox}>{err}</div>}
        {!index && !err && <div style={S.center}><div className="spin"></div></div>}
        {index && view==="home" && <Home index={index} analyzedIdx={analyzedIdx} go={setView}/>}
        {index && view==="browse" && <Browse index={index}/>}
        {index && view==="practice" && <Practice analyzedIdx={analyzedIdx}/>}
        {index && view==="memory" && <MemoryGame analyzedIdx={analyzedIdx}/>}
        {index && view==="signals" && <SignalsGame/>}
      </main>
      <footer style={S.footer}>נבנה ללימוד · טקסט: מהדורת William Davidson (Sefaria, CC)</footer>
    </div>
  );
}

/* ===== בית ===== */
function Home({index,analyzedIdx,go}){
  return (
    <div className="fade">
      <div style={S.hero}>
        <h1 style={S.heroTitle}>ללמוד גמרא לעומק</h1>
        <p style={S.heroText}>
          עיון בכל הש"ס — {index.tractates.length} מסכתות, מנוקד ולא מנוקד — ותרגול
          ניתוח סוגיות לפי עשר תוויות: זיהוי שאלה, קושיה, תירוץ, ראיה ועוד.
        </p>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:18}}>
          <button style={S.heroBtn} onClick={()=>go("browse")}>עיין בש"ס ←</button>
          <button style={S.heroBtnGhost} onClick={()=>go("practice")}>
            תרגל סוגיה ({analyzedIdx?analyzedIdx.sugyot.length:0})
          </button>
        </div>
      </div>
      <div style={S.legendCard}>
        <div style={{fontWeight:800,marginBottom:10,fontSize:18}}>עשר התוויות</div>
        <div style={S.legendGrid}>
          {LABEL_NAMES.map(l=>(
            <div key={l} style={S.legendItem}>
              <span style={{...S.dot,background:LABELS[l]}}></span>
              <div><b>{l}</b><div style={S.legendDesc}>{LABEL_DESC[l]}</div></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ===== עיון בש"ס ===== */
function Browse({index}){
  const [tract,setTract]=useState(null);
  const [data,setData]=useState(null);
  const [daf,setDaf]=useState(null);
  const [voc,setVoc]=useState(false);
  const [loading,setLoading]=useState(false);

  async function pick(t){
    setLoading(true);setTract(t);setData(null);setDaf(null);
    try{
      const d=await loadJSON(t.file);
      setData(d);
      const keys=Object.keys(d.pages);
      setDaf(keys[0]);
      setVoc(d.has_vocalized);
    }catch(e){alert("שגיאה בטעינת המסכת");}
    setLoading(false);
  }

  const dafKeys = data?Object.keys(data.pages):[];
  const page = data&&daf?data.pages[daf]:null;
  const text = page?(voc&&page.vocalized?page.vocalized:page.plain):"";
  const dafLabel = daf?daf.replace("a"," ע\"א").replace("b"," ע\"ב"):"";

  return (
    <div className="fade">
      {!tract && (
        <>
          <h2 style={S.h2}>בחר מסכת</h2>
          <div style={S.tractGrid}>
            {index.tractates.map(t=>(
              <button key={t.en} style={S.tractBtn} onClick={()=>pick(t)}>
                <span style={{fontWeight:800,fontSize:17}}>{t.he}</span>
                <span style={S.tractSub}>{t.daf_count} דפים{t.has_vocalized?" · מנוקד":""}</span>
              </button>
            ))}
          </div>
        </>
      )}
      {loading && <div style={S.center}><div className="spin"></div></div>}
      {tract && data && (
        <div>
          <div style={S.browseBar}>
            <button style={S.backBtn} onClick={()=>setTract(null)}>← מסכתות</button>
            <span style={{fontWeight:800,fontSize:19}}>{data.tractate_he} {dafLabel}</span>
            <select value={daf} onChange={e=>setDaf(e.target.value)} style={S.sel}>
              {dafKeys.map(k=>(
                <option key={k} value={k}>{k.replace("a"," ע\"א").replace("b"," ע\"ב")}</option>
              ))}
            </select>
            {data.has_vocalized && (
              <div style={S.toggle}>
                <button style={tog(!voc)} onClick={()=>setVoc(false)}>ללא ניקוד</button>
                <button style={tog(voc)} onClick={()=>setVoc(true)}>מנוקד</button>
              </div>
            )}
          </div>
          <div style={S.pageText}>{text}</div>
          <div style={S.dafNav}>
            <button style={S.navArrow} disabled={dafKeys.indexOf(daf)===0}
              onClick={()=>setDaf(dafKeys[dafKeys.indexOf(daf)-1])}>← הקודם</button>
            <button style={S.navArrow} disabled={dafKeys.indexOf(daf)===dafKeys.length-1}
              onClick={()=>setDaf(dafKeys[dafKeys.indexOf(daf)+1])}>הבא →</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ===== תרגול סוגיות ===== */
function Practice({analyzedIdx}){
  const [sugya,setSugya]=useState(null);
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [mode,setMode]=useState("overview"); // overview | punct

  async function pick(s){
    setLoading(true);setSugya(s);setData(null);
    try{setData(await loadJSON(s.file));setMode("overview");}
    catch(e){alert("שגיאה");}
    setLoading(false);
  }

  if(!analyzedIdx||analyzedIdx.sugyot.length===0)
    return <div style={S.errBox}>אין עדיין סוגיות מנותחות.</div>;

  return (
    <div className="fade">
      {!sugya && (
        <>
          <h2 style={S.h2}>סוגיות לתרגול</h2>
          <p style={S.muted}>סוגיות שנותחו מראש — חלוקה לנושאים, ותרגול פיסוק וצביעה לפי עשר התוויות.</p>
          <div style={{display:"grid",gap:12}}>
            {analyzedIdx.sugyot.map(s=>(
              <button key={s.id} style={S.sugyaBtn} onClick={()=>pick(s)}>
                <span style={{fontWeight:800,fontSize:17}}>{s.title}</span>
                <span style={S.tractSub}>{s.topic_count} נושאים</span>
              </button>
            ))}
          </div>
        </>
      )}
      {loading && <div style={S.center}><div className="spin"></div></div>}
      {data && (
        <div>
          <div style={S.browseBar}>
            <button style={S.backBtn} onClick={()=>setSugya(null)}>← סוגיות</button>
            <span style={{fontWeight:800,fontSize:18,flex:1}}>{data.title}</span>
            <div style={S.toggle}>
              <button style={tog(mode==="overview")} onClick={()=>setMode("overview")}>נושאים</button>
              <button style={tog(mode==="punct")} onClick={()=>setMode("punct")}>פיסוק וצביעה</button>
            </div>
          </div>
          {mode==="overview" && <Overview data={data}/>}
          {mode==="punct" && <PunctPractice data={data}/>}
        </div>
      )}
    </div>
  );
}

/* ---- תצוגת נושאים ---- */
function Overview({data}){
  const [open,setOpen]=useState(0);
  return (
    <div>
      {data.topics.map((t,i)=>(
        <div key={t.topic_id} style={S.topicCard}>
          <button style={S.topicHead} onClick={()=>setOpen(open===i?-1:i)}>
            <span style={S.topicNum}>{t.topic_id}</span>
            <span style={{flex:1,textAlign:"right",fontWeight:800}}>{t.topic_title}</span>
            <span>{open===i?"−":"+"}</span>
          </button>
          {open===i && (
            <div style={S.topicBody} className="fade">
              <div style={S.topicSummary}>{t.summary}</div>
              {t.segments.map((s,j)=>(
                <div key={j} style={{...S.seg,background:LABELS[s.label]}}>
                  <div style={S.segText}>{s.text}</div>
                  <span style={S.tag}>{s.label}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ---- פיסוק וצביעה (גישת סימון, ללא AI — מול מפתח פתרון) ---- */
/* פלטת צבעים לסימון משפטים (לפני בחירת תווית) — כדי שהחלוקה תהיה ברורה ויזואלית */
const SEG_PALETTE=["#fde2c4","#cfe8d4","#cfe0f5","#f6d6e0","#e2dcf2","#d8efe2","#f3e3c0","#e0ecc4","#f0d8c8","#d4e8f0","#ece0c0","#e8d4ec"];
/* מילים מבניות שאינן חלק מהפיסוק */
const STRUCTURAL=new Set(["מתני׳","מתני'","גמ׳","גמ'"]);
function isStructural(w){ return STRUCTURAL.has(w.replace(/[:׃]/g,"")); }

function PunctPractice({data}){
  // רשימת המילים, תוך דילוג על מילים מבניות (מתני׳/גמ׳) בבניית הגבולות
  const rawWords = data.topics.flatMap(t=>t.segments.map(s=>s.text)).join(" ").split(/\s+/).filter(Boolean);
  // נבנה מערך מילים "לפיסוק" בלי המבניות, ונשמור מיפוי לתצוגה
  const words=[]; // המילים שניתן לסמן
  rawWords.forEach(w=>{ if(!isStructural(w)) words.push(w); });

  // מפתח פתרון לפי המילים שאחרי סינון המבניות
  const keySegs=[]; let cursor=0;
  data.topics.forEach(t=>t.segments.forEach(s=>{
    const segWords=s.text.split(/\s+/).filter(Boolean).filter(w=>!isStructural(w));
    if(segWords.length===0) return;
    keySegs.push({start:cursor,end:cursor+segWords.length-1,label:s.label,text:segWords.join(" ")});
    cursor+=segWords.length;
  }));

  const [marks,setMarks]=useState([]); // {start,end,label}
  const [anchor,setAnchor]=useState(null);
  const [checked,setChecked]=useState(false);
  const [showSolution,setShowSolution]=useState(false);
  const [pendingIdx,setPendingIdx]=useState(null); // קטע שממתין לבחירת תווית — פותח בורר מיד

  function markOf(i){return marks.findIndex(m=>i>=m.start&&i<=m.end);}
  function clickWord(i){
    if(checked) return;
    const ex=markOf(i);
    if(ex!==-1 && anchor===null){
      // לחיצה על קטע קיים: אם אין לו תווית — פתח בורר; אם יש — בטל אותו
      if(!marks[ex].label){ setPendingIdx(ex); return; }
      setMarks(ms=>ms.filter((_,k)=>k!==ex));
      setPendingIdx(null);
      return;
    }
    if(anchor===null){setAnchor(i);}
    else{
      const start=Math.min(anchor,i),end=Math.max(anchor,i);
      if(marks.some(m=>start<=m.end&&end>=m.start)){setAnchor(null);return;}
      const next=[...marks,{start,end,label:""}].sort((a,b)=>a.start-b.start);
      setMarks(next);
      setAnchor(null);
      // פתח מיד את בורר התווית עבור הקטע החדש
      setPendingIdx(next.findIndex(m=>m.start===start));
    }
  }
  function assignLabel(idx,label){
    setMarks(ms=>ms.map((x,k)=>k===idx?{...x,label}:x));
    setPendingIdx(null);
  }
  // צבע ייחודי לכל סימון לפי סדר הופעתו (קבוע, לא תלוי בתווית)
  function segColor(idx){ return SEG_PALETTE[idx%SEG_PALETTE.length]; }

  function evalMark(m){
    const k=keySegs.find(s=>s.start===m.start&&s.end===m.end);
    if(!k) return {boundary:false};
    return {boundary:true,labelOk:m.label===k.label,correct:k.label};
  }
  // האם יש גבול נכון אחרי מילה i לפי הפתרון (כדי לסמן נקודות טעות)
  const keyBoundaryAfter=new Set(keySegs.map(s=>s.end));
  const studentBoundaryAfter=new Set(marks.map(m=>m.end));

  const marked=marks.reduce((n,m)=>n+(m.end-m.start+1),0);
  const unmarked=words.length-marked;
  let bGood=0,lGood=0;
  if(checked) marks.forEach(m=>{const r=evalMark(m);if(r.boundary){bGood++;if(r.labelOk)lGood++;}});

  const pendingMark = pendingIdx!==null ? marks[pendingIdx] : null;

  return (
    <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
      <div style={{flex:"1 1 360px"}}>
        {!checked && (
          <p style={S.muted}>
            לחץ על <b>המילה הראשונה</b> של שלב ואז על <b>המילה האחרונה</b> שלו — מיד ייפתח בורר לבחירת סוג המשפט.
            כסה את כל הטקסט ולחץ "בדוק". לחיצה על קטע ללא תווית פותחת שוב את הבורר; לחיצה על קטע מתויג מבטלת אותו.
          </p>
        )}
        <div style={S.flow}>
          {words.map((w,i)=>{
            const mi=markOf(i),inM=mi!==-1;
            // צבע: לפי הסימון (ייחודי לכל קטע) — מיד עם הסימון, עוד לפני תווית
            let bg="transparent";
            if(inM) bg=segColor(mi);
            if(anchor===i) bg="#f0d9ab";
            let ring={};
            if(checked){
              // סימון נקודת טעות: גבול שהתלמיד שם ואינו בפתרון, או שחסר
              const studentEnds=studentBoundaryAfter.has(i);
              const keyEnds=keyBoundaryAfter.has(i);
              if(studentEnds&&!keyEnds) ring={boxShadow:"inset -3px 0 0 #c62828"}; // גבול מיותר
              else if(!studentEnds&&keyEnds&&inM) ring={boxShadow:"inset -3px 0 0 #e0922e"}; // גבול חסר
            }
            return <span key={i} onClick={()=>clickWord(i)}
              style={{...S.word,background:bg,...ring,fontWeight:anchor===i?800:400,
              cursor:checked?"default":"pointer"}}>{w}</span>;
          })}
        </div>
        {anchor!==null && <div style={S.hint}>נבחרה מילת התחלה — לחץ על מילת הסיום.
          <span style={{textDecoration:"underline",cursor:"pointer",marginRight:6}}
          onClick={()=>setAnchor(null)}>ביטול</span></div>}

        {/* בורר תווית צף — קופץ מיד אחרי סימון קטע */}
        {pendingMark && !checked && (
          <div style={S.labelPicker} className="fade">
            <div style={{fontWeight:800,marginBottom:4}}>איזה סוג משפט זה?</div>
            <div style={{...S.segText,marginBottom:10,background:"#fffef9",borderRadius:8,padding:"8px 10px",border:"1px solid var(--line)"}}>
              {words.slice(pendingMark.start,pendingMark.end+1).join(" ")}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {LABEL_NAMES.map(l=>(
                <button key={l} onClick={()=>assignLabel(pendingIdx,l)}
                  style={{...S.labelBtn,background:LABELS[l]}}>{l}</button>
              ))}
            </div>
            <button style={{...S.secondary,marginTop:10}}
              onClick={()=>{ setMarks(ms=>ms.filter((_,k)=>k!==pendingIdx)); setPendingIdx(null); }}>
              בטל סימון
            </button>
          </div>
        )}

        {/* רשימת הקטעים — תצוגה בלבד; לחיצה על קטע ללא תווית פותחת בורר */}
        <div style={{marginTop:14}}>
          {marks.map((m,idx)=>{
            const r=checked?evalMark(m):null;
            return (
              <div key={`${m.start}-${m.end}`}
                onClick={()=>{ if(!checked && !m.label) setPendingIdx(idx); }}
                style={{...S.seg,cursor:(!checked&&!m.label)?"pointer":"default",
                background:m.label?LABELS[m.label]:segColor(idx),
                borderRight:`5px solid ${checked?(r.boundary?(r.labelOk?"#2e7d32":"#e0922e"):"#c62828"):segColor(idx)}`}}>
                <div style={S.segText}>{words.slice(m.start,m.end+1).join(" ")}</div>
                {!checked?(
                  m.label
                    ? <span style={S.tag}>{m.label}</span>
                    : <span style={{...S.tag,background:"#b8946a"}}>לחץ לבחירת תווית</span>
                ):(
                  <div style={{...S.hint,background:r.boundary?(r.labelOk?"#e6f4ea":"#fff6e5"):"#fdecea"}}>
                    {!r.boundary?"✗ גבולות הקטע אינם תואמים את הפתרון.":
                     r.labelOk?`✓ נכון! (${m.label})`:`הגבולות נכונים, התווית הנכונה: ${r.correct} — ${LABEL_DESC[r.correct]}`}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {!checked?(
          <button style={S.primary} disabled={marks.length===0||marks.some(m=>!m.label)}
            onClick={()=>setChecked(true)}>
            {marks.some(m=>!m.label)?"בחר תווית לכל קטע":"בדוק"}
          </button>
        ):(
          <div style={S.scoreBox}>
            <div>📏 גבולות: {bGood}/{keySegs.length} קטעים תוחמו נכון</div>
            <div style={{marginTop:6}}>🎨 צביעה: {lGood}/{keySegs.length} תויגו נכון</div>
            {unmarked>0 && <div style={{marginTop:6,color:"#b26a00"}}>⚠️ נותרו {unmarked} מילים לא מסומנות.</div>}
            <div style={{marginTop:8,fontSize:13.5,fontWeight:400,color:"#6b4f24"}}>
              קו אדום = גבול מיותר · קו כתום = גבול שחסר
            </div>
            <button style={{...S.primary,marginTop:10}} onClick={()=>setShowSolution(v=>!v)}>
              {showSolution?"הסתר פתרון":"הצג את הפיסוק הנכון"}
            </button>
            <button style={{...S.secondary,marginTop:10,marginRight:8}} onClick={()=>{setChecked(false);setPendingIdx(null);}}>חזור לעריכה</button>
            <button style={{...S.secondary,marginTop:10,marginRight:8}}
              onClick={()=>{setMarks([]);setAnchor(null);setChecked(false);setShowSolution(false);setPendingIdx(null);}}>התחל מחדש</button>
          </div>
        )}

        {/* הפיסוק הנכון המלא */}
        {checked && showSolution && (
          <div style={{marginTop:16}} className="fade">
            <div style={{fontWeight:800,fontSize:17,marginBottom:8,color:"#5b3a1f"}}>הפיסוק הנכון:</div>
            {keySegs.map((s,i)=>(
              <div key={i} style={{...S.seg,background:LABELS[s.label],borderRight:"5px solid #2e7d32"}}>
                <div style={S.segText}>{s.text}</div>
                <span style={S.tag}>{s.label}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      <Legend/>
    </div>
  );
}

/* ===== משחק זיכרון (ארמית ↔ עברית) ===== */
const BOARD_SIZES=[
  {label:"קל (4×3)",pairs:6},
  {label:"בינוני (4×4)",pairs:8},
  {label:"גדול (5×4)",pairs:10},
  {label:"ענק (6×4)",pairs:12},
];

function MemoryGame({analyzedIdx}){
  const [source,setSource]=useState(null); // 'common' | sugyaId
  const [level,setLevel]=useState(0); // 0=all,1,2,3
  const [pool,setPool]=useState(null); // [{ar,he,level}]
  const [pairs,setPairs]=useState(8);
  const [started,setStarted]=useState(false);
  const [cards,setCards]=useState([]);
  const [flipped,setFlipped]=useState([]);
  const [matched,setMatched]=useState([]);
  const [tries,setTries]=useState(0);
  const [done,setDone]=useState(false);
  const [loading,setLoading]=useState(false);

  async function chooseSource(src){
    setLoading(true);
    setSource(src);
    try{
      if(src==="common"){
        const c=await loadJSON("common.json");
        setPool(c.words);
      }else{
        const s=await loadJSON(src.file);
        setPool(s.vocab||[]);
      }
    }catch(e){alert("שגיאה בטעינת המילים");setSource(null);}
    setLoading(false);
  }

  function start(){
    let words=pool.filter(w=>level===0||w.level===level);
    if(words.length<pairs){
      // אם אין מספיק ברמה, השלם מהשאר
      const extra=pool.filter(w=>!words.includes(w));
      words=words.concat(extra).slice(0,pairs);
    }
    words=[...words].sort(()=>Math.random()-0.5).slice(0,pairs);
    let deck=[];
    words.forEach((w,i)=>{
      deck.push({id:i+"a",pair:i,text:w.ar,kind:"ar"});
      deck.push({id:i+"b",pair:i,text:w.he,kind:"he"});
    });
    deck=deck.sort(()=>Math.random()-0.5);
    setCards(deck);setFlipped([]);setMatched([]);setTries(0);setDone(false);setStarted(true);
  }

  function flip(idx){
    if(flipped.length===2||flipped.includes(idx)||matched.includes(idx))return;
    const nf=[...flipped,idx];
    setFlipped(nf);
    if(nf.length===2){
      setTries(t=>t+1);
      const [a,b]=nf;
      if(cards[a].pair===cards[b].pair){
        setTimeout(()=>{
          setMatched(m=>{
            const nm=[...m,a,b];
            if(nm.length===cards.length)setDone(true);
            return nm;
          });
          setFlipped([]);
        },500);
      }else{
        setTimeout(()=>setFlipped([]),850);
      }
    }
  }

  const cols=Math.min(6,Math.ceil(Math.sqrt(cards.length*1.4)));

  // מסך בחירת מקור
  if(!source)
    return (
      <div className="fade">
        <h2 style={S.h2}>משחק זיכרון — ארמית ↔ עברית</h2>
        <p style={S.muted}>התאם כל מילה ארמית לתרגום העברי. בחר מקור מילים:</p>
        <div style={{display:"grid",gap:12}}>
          <button style={S.sugyaBtn} onClick={()=>chooseSource("common")}>
            <span style={{fontWeight:800,fontSize:17}}>מילים נפוצות (חופשי)</span>
            <span style={S.tractSub}>המילים החשובות ביותר ללימוד גמרא — לא קשור לסוגיה</span>
          </button>
          {analyzedIdx&&analyzedIdx.sugyot.map(s=>(
            <button key={s.id} style={S.sugyaBtn} onClick={()=>chooseSource(s)}>
              <span style={{fontWeight:800,fontSize:17}}>מילות הסוגיה — {s.title}</span>
              <span style={S.tractSub}>המילים הארמיות מתוך הדף</span>
            </button>
          ))}
        </div>
      </div>
    );

  // מסך הגדרות לפני התחלה
  if(!started)
    return (
      <div className="fade">
        <div style={S.browseBar}>
          <button style={S.backBtn} onClick={()=>{setSource(null);setPool(null);}}>← מקור</button>
          <span style={{fontWeight:800,fontSize:18,flex:1}}>
            {source==="common"?"מילים נפוצות":"מילות הסוגיה"}
          </span>
        </div>
        {loading?<div style={S.center}><div className="spin"></div></div>:(
          <div style={S.legendCard}>
            <div style={{fontWeight:800,marginBottom:10}}>רמת קושי</div>
            <div style={S.toggle}>
              {[[0,"הכל"],[1,"מתחילים"],[2,"בינוני"],[3,"מתקדם"]].map(([v,l])=>(
                <button key={v} style={tog(level===v)} onClick={()=>setLevel(v)}>{l}</button>
              ))}
            </div>
            <div style={{fontWeight:800,margin:"18px 0 10px"}}>גודל הלוח</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {BOARD_SIZES.map(b=>(
                <button key={b.pairs} style={{...S.secondary,...(pairs===b.pairs?{background:"#7a4a1f",color:"#fff7e8"}:{})}}
                  onClick={()=>setPairs(b.pairs)}>{b.label}</button>
              ))}
            </div>
            <button style={S.primary} onClick={start}>התחל משחק</button>
          </div>
        )}
      </div>
    );

  // לוח המשחק
  return (
    <div className="fade">
      <div style={S.browseBar}>
        <button style={S.backBtn} onClick={()=>setStarted(false)}>← הגדרות</button>
        <span style={{fontWeight:700}}>🔄 {tries} ניסיונות</span>
        <button style={S.secondary} onClick={start}>לוח חדש</button>
      </div>
      {done&&(
        <div style={S.scoreBox}>
          🎉 כל הכבוד! סיימת ב-{tries} ניסיונות
          {tries<=pairs+2?" — מצוין!":""}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:8,marginTop:14}}>
        {cards.map((c,i)=>{
          const up=flipped.includes(i)||matched.includes(i);
          return (
            <div key={c.id} onClick={()=>flip(i)}
              style={{...S.memCard,
                background:up?(c.kind==="ar"?"#fff3d6":"#e2f1e4"):"#5b3a1f",
                color:up?"#2b1a0d":"#5b3a1f",
                ...(matched.includes(i)?{opacity:.55,boxShadow:"inset 0 0 0 2px #2e7d32"}:{})}}>
              {up?c.text:"📜"}
            </div>
          );
        })}
      </div>
    </div>
  );
}


/* ===== זיהוי תמרורים — מילות מפתח ומה הן מסמנות ===== */
function SignalsGame(){
  const [pool,setPool]=useState(null);
  const [level,setLevel]=useState(0);
  const [started,setStarted]=useState(false);
  const [queue,setQueue]=useState([]);
  const [pos,setPos]=useState(0);
  const [choice,setChoice]=useState(null);
  const [score,setScore]=useState(0);
  const [options,setOptions]=useState([]);

  useEffect(()=>{ loadJSON("signals.json").then(d=>setPool(d.signals)).catch(()=>{}); },[]);

  function buildOptions(correct){
    // התווית הנכונה + 3 מסיחים אקראיים מתוך 10 התוויות
    const others=LABEL_NAMES.filter(l=>l!==correct).sort(()=>Math.random()-0.5).slice(0,3);
    return [correct,...others].sort(()=>Math.random()-0.5);
  }
  function start(){
    let items=pool.filter(s=>level===0||s.level===level);
    items=[...items].sort(()=>Math.random()-0.5);
    setQueue(items);setPos(0);setScore(0);setChoice(null);
    setOptions(buildOptions(items[0].label));
    setStarted(true);
  }
  function pick(l){
    if(choice)return;
    setChoice(l);
    if(l===queue[pos].label)setScore(s=>s+1);
  }
  function next(){
    const np=pos+1;
    if(np>=queue.length){ setStarted(false); return; }
    setPos(np);setChoice(null);setOptions(buildOptions(queue[np].label));
  }

  if(!pool)return <div style={S.center}><div className="spin"></div></div>;

  if(!started)
    return (
      <div className="fade">
        <h2 style={S.h2}>זיהוי תמרורים</h2>
        <p style={S.muted}>
          לכל מילת מפתח בגמרא יש "תמרור" — היא מסמנת מה עומד לקרות: שאלה, קושיה, תירוץ, ראיה ועוד.
          זהה מה כל מילה מסמנת. ככל שתכיר את התמרורים, תדע לקרוא גמרא לבד.
        </p>
        {pos>0 && <div style={S.scoreBox}>הסיבוב הקודם: {score}/{queue.length} נכון</div>}
        <div style={S.legendCard}>
          <div style={{fontWeight:800,marginBottom:10}}>רמת קושי</div>
          <div style={S.toggle}>
            {[[0,"הכל"],[1,"מתחילים"],[2,"בינוני"],[3,"מתקדם"]].map(([v,l])=>(
              <button key={v} style={tog(level===v)} onClick={()=>setLevel(v)}>{l}</button>
            ))}
          </div>
          <button style={S.primary} onClick={start}>התחל</button>
        </div>
      </div>
    );

  const cur=queue[pos];
  return (
    <div className="fade">
      <div style={S.browseBar}>
        <button style={S.backBtn} onClick={()=>setStarted(false)}>← יציאה</button>
        <span style={{fontWeight:700,flex:1}}>שאלה {pos+1}/{queue.length}</span>
        <span style={{fontWeight:800}}>✓ {score}</span>
      </div>
      <div style={{...S.pageText,textAlign:"center",fontSize:30,padding:"30px 20px"}}>
        {cur.word}
      </div>
      <p style={{...S.muted,textAlign:"center"}}>מה מסמנת המילה הזו?</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
        {options.map(l=>{
          let bg="#fffdf6",border="1px solid var(--line)";
          if(choice){
            if(l===cur.label){bg="#e6f4ea";border="2px solid #2e7d32";}
            else if(l===choice){bg="#fdecea";border="2px solid #c62828";}
          }
          return (
            <button key={l} onClick={()=>pick(l)} disabled={!!choice}
              style={{padding:"16px 10px",borderRadius:11,background:bg,border,
                fontFamily:"inherit",fontWeight:800,fontSize:16,color:"#3a2410",
                cursor:choice?"default":"pointer"}}>{l}</button>
          );
        })}
      </div>
      {choice && (
        <div style={{...S.scoreBox,marginTop:14}} className="fade">
          <div style={{fontSize:17}}>
            {choice===cur.label?"✓ נכון!":`✗ התשובה הנכונה: ${cur.label}`}
          </div>
          <div style={{fontWeight:400,marginTop:6,fontSize:15}}>{cur.explain}</div>
          <button style={S.primary} onClick={next}>
            {pos+1>=queue.length?"סיים":"הבא ←"}
          </button>
        </div>
      )}
    </div>
  );
}


function Legend(){
  return (
    <div style={S.legendSide}>
      <div style={{fontWeight:800,marginBottom:8}}>מקרא</div>
      {LABEL_NAMES.map(l=>(
        <div key={l} style={S.legendItem}>
          <span style={{...S.dot,background:LABELS[l]}}></span>
          <div><b>{l}</b><div style={S.legendDesc}>{LABEL_DESC[l]}</div></div>
        </div>
      ))}
    </div>
  );
}
